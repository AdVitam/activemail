AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'sorbet/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'lib/generators/activemail/templates/**/*'

Layout/LineLength:
  Max: 160
  Exclude:
    - 'test/**/*'

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Metrics/BlockLength:
  Exclude:
    - 'test/**/*'
    - 'activemail.gemspec'

# Test files: autofix only, relaxed metrics.
Metrics/ClassLength:
  Exclude:
    - 'test/**/*'

Metrics/MethodLength:
  Exclude:
    - 'test/**/*'

Metrics/AbcSize:
  Exclude:
    - 'test/**/*'

Naming/VariableNumber:
  Exclude:
    - 'test/**/*'

# Test classes share a file by component; that is intentional grouping.
Style/ClassAndModuleChildren:
  Exclude:
    - 'test/**/*'
