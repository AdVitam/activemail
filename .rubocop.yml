AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'sorbet/**/*'
    - 'spec/test_app/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'lib/generators/inky/templates/**/*'

# Generated markup lines are long by nature.
Layout/LineLength:
  Max: 160
  Exclude:
    - 'lib/inky/components/**/*'
    - 'test/**/*'

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true

Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'lib/inky/components/columns.rb'

Metrics/AbcSize:
  Exclude:
    - 'lib/inky/components/columns.rb'
    - 'lib/inky/components/button.rb'
    - 'lib/inky/components/center.rb'
    - 'lib/inky.rb'

Metrics/CyclomaticComplexity:
  Exclude:
    - 'lib/inky/components/columns.rb'

Metrics/BlockLength:
  Exclude:
    - 'test/**/*'
    - 'inky.gemspec'

# Test files: autofix only, relaxed metrics.
Metrics/ClassLength:
  Exclude:
    - 'test/**/*'

Naming/PredicateMethod:
  Enabled: false

Naming/VariableNumber:
  Exclude:
    - 'test/**/*'

# Test classes share a file by component; that is intentional grouping.
Style/ClassAndModuleChildren:
  Exclude:
    - 'test/**/*'
